apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  destination:
    namespace: monitoring
    server: https://kubernetes.default.svc
  project: default
  syncPolicy:
    automated:
      enabled: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideAppy=true
  sources:
    - repoURL: https://github.com/xelab04/kates.git
      targetRevision: main
      ref: values

    - chart: loki
      repoURL: https://grafana.github.io/helm-charts
      targetRevision: 7.0.0
      helm:
        releaseName: loki
        valueFiles:
          - $values/manifests/system/loki/values.yaml
        ignoreMissingValueFiles: true
