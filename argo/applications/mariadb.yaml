apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mariadb
  namespace: argocd
spec:
  destination:
    namespace: mariadb
    server: https://kubernetes.default.svc
  project: default
  source:
    path: manifests/applications/mariadb
    repoURL: https://github.com/xelab04/hopeops.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      enabled: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideAppy=true
