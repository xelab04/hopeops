apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forgejo
  annotations:
    cert-manager.io/cluster-issuer: "issuer"
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - git.alexbissessur.dev
    secretName: forgejo-tls
  rules:
  - host: git.alexbissessur.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: forgejo-service
            port:
              number: 80
