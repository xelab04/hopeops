apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gts
  annotations:
    cert-manager.io/cluster-issuer: "prod-issuer"
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - registry.alexbissessur.dev
    secretName: registry-tls
  rules:
  - host: registry.alexbissessur.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: docker-reg-svc
            port:
              number: 5000
