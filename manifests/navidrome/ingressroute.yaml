apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gts
  annotations:
    cert-manager.io/cluster-issuer: "prod-issuer"
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - navidrome.alexbissessur.dev
    secretName: navidrome-tls
  rules:
  - host: navidrome.alexbissessur.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: navidrome
            port:
              number: 80
